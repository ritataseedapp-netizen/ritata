<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ありがとうくじ — ログイン</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --mint: #3ddc6e;
    --mint2: #2ab857;
    --green-dim: rgba(61,220,110,0.08);
    --border: rgba(88,179,104,0.22);
    --text: #1a2d20;
    --muted: #6a9478;
    --line: rgba(88,179,104,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #edfdf4 0%, #f4fbf3 40%, #ffffff 100%);
    display: grid; place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    padding: 24px 16px;
  }
  .card {
    width: 100%; max-width: 400px;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px 32px;
    box-shadow: 0 20px 48px rgba(42,184,87,0.1);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute;
    top: -40px; right: -40px; width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(rgba(61,220,110,0.1), transparent 70%);
    pointer-events: none;
  }

  /* Logo */
  .logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-circle {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #2ab857, #3ddc6e);
    display: grid; place-items: center; font-size: 22px;
    box-shadow: 0 6px 16px rgba(42,184,87,0.25); flex: 0 0 auto;
  }
  .logo-title { font-size: 20px; font-weight: 900; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 1px; }

  /* Tab switcher */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: #f0faf3; border-radius: 10px;
    padding: 4px; gap: 4px; margin-bottom: 24px;
  }
  .tab {
    padding: 9px; border-radius: 7px; border: none;
    background: transparent; font-family: inherit;
    font-size: 13px; font-weight: 800; color: var(--muted);
    cursor: pointer; transition: all 0.18s;
  }
  .tab.active {
    background: #fff; color: var(--text);
    box-shadow: 0 2px 8px rgba(42,184,87,0.12);
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  .screen-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .screen-sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }

  /* Google button */
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 13px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); background: #fff;
    cursor: pointer; font-size: 14px; font-weight: 800; color: var(--text);
    transition: all 0.18s; margin-bottom: 18px; font-family: inherit;
  }
  .google-btn:hover {
    border-color: var(--mint2); background: #f4fbf3;
    transform: translateY(-1px); box-shadow: 0 6px 16px rgba(42,184,87,0.12);
  }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .divider span { font-size: 11px; color: #8aab95; font-weight: 800; letter-spacing: 0.06em; }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 11px; font-weight: 800; color: #4d7a5e; letter-spacing: 0.06em; }
  .field-wrap { position: relative; }
  .field input {
    width: 100%; padding: 12px 40px 12px 14px;
    border-radius: 10px; border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.9);
    font-size: 14px; font-weight: 700; color: var(--text);
    outline: none; transition: border-color 0.18s, box-shadow 0.18s;
    font-family: inherit;
  }
  .field input:focus {
    border-color: var(--mint);
    box-shadow: 0 0 0 3px rgba(61,220,110,0.12);
  }
  .field input::placeholder { color: #adc5b5; font-weight: 500; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 16px; color: #8aab95;
  }

  .forgot { text-align: right; margin: -6px 0 18px; }
  .forgot a { font-size: 12px; color: var(--mint2); font-weight: 800; text-decoration: none; cursor: pointer; }

  /* Primary button */
  .btn {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #2ab857, #3ddc6e);
    color: #fff; font-size: 15px; font-weight: 900;
    cursor: pointer; font-family: inherit;
    transition: all 0.18s;
    box-shadow: 0 8px 20px rgba(42,184,87,0.28);
    margin-bottom: 18px;
  }
  .btn:hover { opacity: 0.93; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .switch-row { text-align: center; font-size: 13px; color: #8aab95; font-weight: 600; }
  .switch-row a { color: var(--mint2); font-weight: 800; text-decoration: none; cursor: pointer; }

  /* Toast */
  .toast {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    margin-top: 16px; opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #edfdf4; border: 1px solid rgba(42,184,87,0.3); color: #1a6635; }
  .toast.error { background: #fff0ee; border: 1px solid rgba(255,107,74,0.3); color: #c0392b; }

  /* Logged in state */
  .loggedin { text-align: center; padding: 8px 0; }
  .loggedin-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #2ab857, #3ddc6e);
    display: grid; place-items: center; font-size: 32px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 20px rgba(42,184,87,0.25);
  }
  .loggedin-name { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .loggedin-email { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .loggedin-points {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 999px;
    background: var(--green-dim); border: 1px solid var(--border);
    font-size: 15px; font-weight: 900; color: var(--mint2);
    margin-bottom: 24px;
  }
  .btn-outline {
    width: 100%; padding: 13px; border-radius: 12px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--muted); font-size: 14px; font-weight: 800;
    cursor: pointer; font-family: inherit; transition: all 0.18s;
  }
  .btn-outline:hover { border-color: #ff6b4a; color: #ff6b4a; background: rgba(255,107,74,0.05); }

  .goto-app {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #2ab857, #3ddc6e);
    color: #fff; font-size: 15px; font-weight: 900;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 8px 20px rgba(42,184,87,0.28);
    margin-bottom: 12px; transition: all 0.18s;
    text-decoration: none;
  }
  .goto-app:hover { opacity: 0.93; transform: translateY(-1px); }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-circle">🌿</div>
    <div>
      <div class="logo-title">ありがとうくじ</div>
      <div class="logo-sub">Arigato Kuji</div>
    </div>
  </div>

  <!-- ログイン済み表示 -->
  <div class="screen" id="screen-loggedin">
    <div class="loggedin">
      <div class="loggedin-avatar">🌿</div>
      <div class="loggedin-name" id="user-name">—</div>
      <div class="loggedin-email" id="user-email">—</div>
      <div class="loggedin-points">🎁 <span id="user-points">25</span> pt 保有中</div>
      <a class="goto-app" href="/arigato-kuji-v2.html">アプリを開く →</a>
      <button class="btn-outline" id="logout-btn">ログアウト</button>
    </div>
  </div>

  <!-- 未ログイン表示 -->
  <div class="screen active" id="screen-auth">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
    </div>

    <!-- ログイン -->
    <div class="screen active" id="form-login">
      <div class="screen-title">おかえりなさい👋</div>
      <div class="screen-sub">ログインして今日も歩いてポイントを貯めよう。</div>

      <button class="google-btn" id="google-login-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Googleでログイン
      </button>

      <div class="divider"><span>または</span></div>

      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>パスワード</label>
        <div class="field-wrap">
          <input type="password" id="login-pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('login-pw', this)">👁</button>
        </div>
      </div>
      <div class="forgot"><a onclick="handleForgot()">パスワードを忘れた？</a></div>
      <button class="btn" id="login-btn">ログイン</button>
      <div class="switch-row">アカウントをお持ちでない方は <a onclick="switchTab('signup')">新規登録</a></div>
    </div>

    <!-- 新規登録 -->
    <div class="screen" id="form-signup">
      <div class="screen-title">はじめまして🌱</div>
      <div class="screen-sub">アカウントを作って、ありがとうくじを始めよう。</div>

      <button class="google-btn" id="google-signup-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Googleで登録
      </button>

      <div class="divider"><span>または</span></div>

      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="signup-email" placeholder="your@email.com" />
      </div>
      <div class="field">
        <label>パスワード（6文字以上）</label>
        <div class="field-wrap">
          <input type="password" id="signup-pw" placeholder="••••••••" />
          <button class="pw-toggle" onclick="togglePw('signup-pw', this)">👁</button>
        </div>
      </div>
      <button class="btn" id="signup-btn">アカウントを作成</button>
      <div class="switch-row">すでにアカウントをお持ちの方は <a onclick="switchTab('login')">ログイン</a></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
  // ===== SUPABASE INIT =====
  const { createClient } = supabase;
  const sb = createClient(
    'https://mvvxoaiufmrycvqscjhe.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dnhvYWl1Zm1yeWN2cXNjamhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTU0ODEsImV4cCI6MjA5NTc5MTQ4MX0.mGWVNAZ3MfT2XluLfxI2v-fMgrGnTLRrYGPCLCdAis'
  );

  // ===== UI HELPERS =====
  const $ = id => document.getElementById(id);

  const showToast = (msg, type = 'success') => {
    const t = $('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 4000);
  };

  const setLoading = (btnId, loading) => {
    const btn = $(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? '処理中...' : btn.dataset.label;
  };

  const switchTab = (tab) => {
    $('tab-login').classList.toggle('active', tab === 'login');
    $('tab-signup').classList.toggle('active', tab === 'signup');
    $('form-login').classList.toggle('active', tab === 'login');
    $('form-signup').classList.toggle('active', tab === 'signup');
  };

  const togglePw = (inputId, btn) => {
    const inp = $(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  };

  // Save button labels
  $('login-btn').dataset.label = 'ログイン';
  $('signup-btn').dataset.label = 'アカウントを作成';

  // ===== AUTH STATE =====
  const showLoggedIn = async (user) => {
    $('screen-auth').classList.remove('active');
    $('screen-loggedin').classList.add('active');

    // Display user info
    const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'ユーザー';
    $('user-name').textContent = name;
    $('user-email').textContent = user.email;

    // Fetch points from DB
    const { data } = await sb
      .from('points')
      .select('normal_points')
      .eq('user_id', user.id)
      .single();

    if (data) $('user-points').textContent = data.normal_points;
  };

  const showLoggedOut = () => {
    $('screen-auth').classList.add('active');
    $('screen-loggedin').classList.remove('active');
  };

  // Listen to auth changes
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      window.location.href = '/arigato-kuji-v2.html';
    } else if (!session) {
      showLoggedOut();
    }
  });

  // Check on load
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session?.user) showLoggedIn(session.user);
  });

  // ===== GOOGLE LOGIN =====
  const googleLogin = async () => {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: 'https://arigatouroto.vercel.app/arigato-kuji-v2.html' }
    });
    if (error) showToast(error.message, 'error');
  };

  $('google-login-btn').addEventListener('click', googleLogin);
  $('google-signup-btn').addEventListener('click', googleLogin);

  // ===== EMAIL LOGIN =====
  $('login-btn').addEventListener('click', async () => {
    const email = $('login-email').value.trim();
    const pw = $('login-pw').value;
    if (!email || !pw) { showToast('メールとパスワードを入力してください', 'error'); return; }

    setLoading('login-btn', true);
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    setLoading('login-btn', false);

    if (error) showToast('メールかパスワードが間違っています', 'error');
    else showToast('ログイン成功！');
  });

  // ===== EMAIL SIGNUP =====
  $('signup-btn').addEventListener('click', async () => {
    const email = $('signup-email').value.trim();
    const pw = $('signup-pw').value;
    if (!email || !pw) { showToast('メールとパスワードを入力してください', 'error'); return; }
    if (pw.length < 6) { showToast('パスワードは6文字以上にしてください', 'error'); return; }

    setLoading('signup-btn', true);
    const { error } = await sb.auth.signUp({ email, password: pw });
    setLoading('signup-btn', false);

    if (error) showToast(error.message, 'error');
    else showToast('確認メールを送信しました！メールを確認してください📩');
  });

  // ===== FORGOT PASSWORD =====
  const handleForgot = async () => {
    const email = $('login-email').value.trim();
    if (!email) { showToast('メールアドレスを入力してください', 'error'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email);
    if (error) showToast(error.message, 'error');
    else showToast('パスワードリセットメールを送信しました📩');
  };

  // ===== LOGOUT =====
  $('logout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    showToast('ログアウトしました');
  });
</script>
</body>
</html>
